<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>ПромоКам</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; color: #fff; font-family: -apple-system, sans-serif; height: 100vh; overflow: hidden; }

#setup {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  height: 100vh; padding: 30px; background: #111;
}
#setup h1 { font-size: 28px; margin-bottom: 8px; }
#setup p { color: #888; margin-bottom: 30px; font-size: 14px; }
#setup input {
  width: 100%; padding: 18px; font-size: 24px; text-align: center;
  border: 2px solid #333; border-radius: 12px; background: #222; color: #fff;
  margin-bottom: 16px; letter-spacing: 4px;
}
#setup input:focus { outline: none; border-color: #e53; }
#setup button {
  width: 100%; padding: 18px; font-size: 18px; font-weight: bold;
  background: #e53; color: #fff; border: none; border-radius: 12px; cursor: pointer;
}

#camera-view { display: none; position: relative; height: 100vh; }
video { width: 100%; height: 100%; object-fit: cover; }

#overlay {
  position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  pointer-events: none;
}

#top-bar {
  position: absolute; top: 0; left: 0; right: 0;
  padding: 12px 16px; background: rgba(0,0,0,0.6);
  display: flex; justify-content: space-between; align-items: center;
}
#route-label { font-size: 18px; font-weight: bold; color: #e53; }
#status { font-size: 13px; color: #aaa; }
#queue-badge {
  background: #e53; color: #fff; border-radius: 20px;
  padding: 4px 10px; font-size: 13px; font-weight: bold;
  display: none;
}

#gps-bar {
  position: absolute; top: 54px; left: 0; right: 0;
  padding: 6px 16px; background: rgba(0,0,0,0.5);
  font-size: 12px; color: #0f0;
}

#bottom-bar {
  position: absolute; bottom: 0; left: 0; right: 0;
  padding: 20px; background: rgba(0,0,0,0.6);
  display: flex; align-items: center; justify-content: center; gap: 30px;
}
#shutter {
  width: 80px; height: 80px; border-radius: 50%;
  background: #fff; border: 5px solid rgba(255,255,255,0.4);
  cursor: pointer; pointer-events: all;
  transition: transform 0.1s;
}
#shutter:active { transform: scale(0.9); }
#shutter.disabled { background: #555; }

#counter { font-size: 14px; color: #aaa; text-align: center; min-width: 60px; }

#notification {
  position: absolute; top: 100px; left: 16px; right: 16px;
  padding: 12px 16px; border-radius: 10px; font-size: 14px;
  display: none; z-index: 10;
}
#notification.success { background: rgba(0,200,0,0.85); }
#notification.error { background: rgba(220,50,50,0.85); }
#notification.warning { background: rgba(200,150,0,0.85); }

canvas { display: none; }
</style>
</head>
<body>

<!-- Экран ввода маршрута -->
<div id="setup">
  <h1>📸 ПромоКам</h1>
  <p>Введите номер маршрута</p>
  <input type="text" id="route-input" placeholder="001" maxlength="6" inputmode="numeric">
  <button onclick="startCamera()">Начать съёмку</button>
</div>

<!-- Экран камеры -->
<div id="camera-view">
  <video id="video" autoplay playsinline muted></video>
  
  <div id="overlay">
    <div id="top-bar">
      <span id="route-label">Маршрут: —</span>
      <span id="queue-badge">↑ 0</span>
      <span id="status">●</span>
    </div>
    <div id="gps-bar" id="gps-info">GPS: определяем...</div>
    <div id="notification"></div>
    <div id="bottom-bar">
      <div id="counter">0 фото</div>
      <div id="shutter" onclick="takePhoto()"></div>
      <div style="min-width:60px"></div>
    </div>
  </div>
</div>

<canvas id="canvas"></canvas>

<script>
const WORKER_URL = 'https://promocam.troeglazoofjob.workers.dev';

let routeNumber = '';
let photoCount = 0;
let gpsData = { lat: null, lon: null, accuracy: null };
let uploadQueue = [];
let isUploading = false;
let stream = null;

// Загружаем очередь из localStorage
function loadQueue() {
  try {
    const saved = localStorage.getItem('uploadQueue');
    if (saved) uploadQueue = JSON.parse(saved);
  } catch(e) {}
  updateQueueBadge();
}

function saveQueue() {
  try {
    localStorage.setItem('uploadQueue', JSON.stringify(uploadQueue));
  } catch(e) {}
}

function updateQueueBadge() {
  const badge = document.getElementById('queue-badge');
  if (uploadQueue.length > 0) {
    badge.style.display = 'block';
    badge.textContent = '↑ ' + uploadQueue.length;
  } else {
    badge.style.display = 'none';
  }
}

// GPS
function startGPS() {
  if (!navigator.geolocation) {
    document.getElementById('gps-bar').textContent = 'GPS: не поддерживается';
    return;
  }
  navigator.geolocation.watchPosition(
    pos => {
      gpsData.lat = pos.coords.latitude.toFixed(6);
      gpsData.lon = pos.coords.longitude.toFixed(6);
      gpsData.accuracy = Math.round(pos.coords.accuracy);
      document.getElementById('gps-bar').textContent = 
        `GPS: ${gpsData.lat}, ${gpsData.lon} (±${gpsData.accuracy}м)`;
      document.getElementById('gps-bar').style.color = gpsData.accuracy < 30 ? '#0f0' : '#ff0';
    },
    err => {
      document.getElementById('gps-bar').textContent = 'GPS: нет доступа';
      document.getElementById('gps-bar').style.color = '#f00';
    },
    { enableHighAccuracy: true, maximumAge: 5000, timeout: 10000 }
  );
}

// Онлайн/офлайн статус
function updateOnlineStatus() {
  const status = document.getElementById('status');
  if (navigator.onLine) {
    status.textContent = '● онлайн';
    status.style.color = '#0f0';
    processQueue();
  } else {
    status.textContent = '⚠ нет сети';
    status.style.color = '#f80';
  }
}

window.addEventListener('online', updateOnlineStatus);
window.addEventListener('offline', updateOnlineStatus);

// Запуск камеры
async function startCamera() {
  const input = document.getElementById('route-input').value.trim();
  if (!input) {
    alert('Введите номер маршрута');
    return;
  }
  routeNumber = input.padStart(3, '0');
  
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1920 }, height: { ideal: 1080 } },
      audio: false
    });
    document.getElementById('video').srcObject = stream;
    document.getElementById('setup').style.display = 'none';
    document.getElementById('camera-view').style.display = 'block';
    document.getElementById('route-label').textContent = 'Маршрут: ' + routeNumber;
    
    startGPS();
    updateOnlineStatus();
    loadQueue();
  } catch(err) {
    alert('Нет доступа к камере: ' + err.message);
  }
}

// Съёмка фото
async function takePhoto() {
  const shutter = document.getElementById('shutter');
  if (shutter.classList.contains('disabled')) return;
  shutter.classList.add('disabled');

  const video = document.getElementById('video');
  const canvas = document.getElementById('canvas');
  canvas.width = video.videoWidth || 1280;
  canvas.height = video.videoHeight || 720;
  
  const ctx = canvas.getContext('2d');
  ctx.drawImage(video, 0, 0);
  
  // Водяной знак
  addWatermark(ctx, canvas.width, canvas.height);
  
  // Конвертируем в blob
  canvas.toBlob(async blob => {
    photoCount++;
    document.getElementById('counter').textContent = photoCount + ' фото';
    
    const now = Date.now();
    const item = {
      blob: await blobToBase64(blob),
      route: routeNumber,
      timestamp: now,
      lat: gpsData.lat || '',
      lon: gpsData.lon || '',
      id: now + '_' + Math.random().toString(36).slice(2,7)
    };
    
    if (navigator.onLine) {
      // Пробуем сразу загрузить
      const success = await uploadPhoto(item);
      if (!success) {
        uploadQueue.push(item);
        saveQueue();
        updateQueueBadge();
        showNotification('Сохранено в очередь', 'warning');
      } else {
        showNotification('✓ Отправлено', 'success');
      }
    } else {
      // Сохраняем в очередь
      uploadQueue.push(item);
      saveQueue();
      updateQueueBadge();
      showNotification('Сохранено (нет сети)', 'warning');
    }
    
    setTimeout(() => shutter.classList.remove('disabled'), 500);
  }, 'image/jpeg', 0.85);
}

function addWatermark(ctx, w, h) {
  const now = new Date();
  const dateStr = now.toLocaleDateString('ru-RU');
  const timeStr = now.toLocaleTimeString('ru-RU');
  
  // Фон для текста
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(0, h - 90, w, 90);
  
  // Маршрут
  ctx.fillStyle = '#ff3333';
  ctx.font = `bold ${Math.floor(w/15)}px Arial`;
  ctx.fillText('МАРШРУТ ' + routeNumber, 16, h - 60);
  
  // Дата и время
  ctx.fillStyle = '#ffffff';
  ctx.font = `${Math.floor(w/30)}px Arial`;
  ctx.fillText(dateStr + '  ' + timeStr, 16, h - 30);
  
  // GPS
  if (gpsData.lat) {
    ctx.fillText(`GPS: ${gpsData.lat}, ${gpsData.lon} (±${gpsData.accuracy}м)`, w/2, h - 30);
  } else {
    ctx.fillStyle = '#ff8800';
    ctx.fillText('GPS: не определён', w/2, h - 30);
  }
}

// Загрузка на сервер
async function uploadPhoto(item) {
  try {
    const blob = base64ToBlob(item.blob, 'image/jpeg');
    const formData = new FormData();
    formData.append('photo', blob, 'photo.jpg');
    formData.append('route', item.route);
    formData.append('timestamp', item.timestamp.toString());
    formData.append('lat', item.lat);
    formData.append('lon', item.lon);
    
    const response = await fetch(WORKER_URL, {
      method: 'POST',
      body: formData,
      signal: AbortSignal.timeout(30000)
    });
    
    const data = await response.json();
    return data.success === true;
  } catch(e) {
    return false;
  }
}

// Обработка очереди
async function processQueue() {
  if (isUploading || uploadQueue.length === 0) return;
  isUploading = true;
  
  while (uploadQueue.length > 0 && navigator.onLine) {
    const item = uploadQueue[0];
    const success = await uploadPhoto(item);
    if (success) {
      uploadQueue.shift();
      saveQueue();
      updateQueueBadge();
      if (uploadQueue.length === 0) {
        showNotification('✓ Все фото отправлены', 'success');
      }
    } else {
      break;
    }
    await new Promise(r => setTimeout(r, 500));
  }
  
  isUploading = false;
}

// Уведомления
function showNotification(text, type) {
  const el = document.getElementById('notification');
  el.textContent = text;
  el.className = type;
  el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 2500);
}

// Утилиты base64
function blobToBase64(blob) {
  return new Promise(resolve => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.readAsDataURL(blob);
  });
}

function base64ToBlob(base64, type) {
  const arr = base64.split(',');
  const bstr = atob(arr[1]);
  let n = bstr.length;
  const u8arr = new Uint8Array(n);
  while(n--) u8arr[n] = bstr.charCodeAt(n);
  return new Blob([u8arr], { type });
}

// Проверяем очередь каждые 30 секунд
setInterval(() => {
  if (navigator.onLine && uploadQueue.length > 0) processQueue();
}, 30000);
</script>
</body>
</html>
