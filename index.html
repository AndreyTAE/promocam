<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-fullscreen">
<meta name="theme-color" content="#0a0a0a">
<title>ПромоКам</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#0a0a0a;
  --paper:#f5f0e8;
  --accent:#e8401c;
  --mono:'JetBrains Mono',monospace;
  --display:'Bebas Neue',cursive;
}
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Bebas+Neue&display=swap');

html,body{height:100%;width:100%;overflow:hidden;background:var(--ink);color:var(--paper);font-family:var(--mono);}

/* SCREENS */
.screen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;transition:opacity .3s;}
.screen.hidden{opacity:0;pointer-events:none;}

/* ── SETUP SCREEN ── */
#setup-screen{background:var(--ink);}
.logo{font-family:var(--display);font-size:64px;letter-spacing:4px;line-height:1;text-align:center;}
.logo-sub{font-size:10px;letter-spacing:4px;color:var(--accent);text-transform:uppercase;margin-top:4px;text-align:center;}
.setup-form{width:100%;max-width:320px;margin-top:48px;}
.field-label{font-size:10px;letter-spacing:3px;color:#666;text-transform:uppercase;margin-bottom:8px;}
.route-input{
  width:100%;background:transparent;
  border:none;border-bottom:2px solid #333;
  color:var(--paper);font-family:var(--display);font-size:56px;
  letter-spacing:4px;text-align:center;padding:8px 0;outline:none;
  transition:border-color .2s;
}
.route-input:focus{border-color:var(--accent);}
.route-input::placeholder{color:#333;}
.gps-status{
  margin-top:16px;font-size:10px;letter-spacing:2px;text-align:center;
  padding:8px;
}
.gps-status.searching{color:#666;}
.gps-status.ok{color:#2ecc71;}
.gps-status.error{color:var(--accent);}
.start-btn{
  width:100%;margin-top:32px;
  background:var(--accent);border:none;
  color:var(--paper);font-family:var(--display);
  font-size:28px;letter-spacing:3px;padding:18px;
  cursor:pointer;transition:opacity .2s;
}
.start-btn:active{opacity:.8;}
.start-btn:disabled{background:#222;color:#444;cursor:not-allowed;}

/* ── CAMERA SCREEN ── */
#camera-screen{background:#000;padding:0;}

#video{
  position:absolute;inset:0;width:100%;height:100%;
  object-fit:cover;
}

/* WATERMARK OVERLAY */
#watermark{
  position:absolute;bottom:0;left:0;right:0;
  padding:12px 16px 20px;
  background:linear-gradient(transparent, rgba(0,0,0,.85));
  pointer-events:none;
}
.wm-route{font-family:var(--display);font-size:28px;letter-spacing:3px;color:var(--accent);line-height:1;}
.wm-time{font-size:13px;letter-spacing:2px;color:var(--paper);margin-top:2px;}
.wm-gps{font-size:11px;letter-spacing:1px;color:#4af;margin-top:2px;}

/* SHUTTER */
#shutter-wrap{
  position:absolute;bottom:32px;left:0;right:0;
  display:flex;align-items:center;justify-content:center;gap:32px;
}
#back-btn{
  width:44px;height:44px;background:rgba(255,255,255,.1);border:none;
  color:var(--paper);font-size:20px;cursor:pointer;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
}
#shutter{
  width:72px;height:72px;
  background:var(--paper);border:4px solid rgba(255,255,255,.3);
  border-radius:50%;cursor:pointer;transition:transform .1s,background .1s;
  display:flex;align-items:center;justify-content:center;
}
#shutter:active{transform:scale(.9);background:#ccc;}
.counter{
  width:44px;height:44px;
  font-family:var(--display);font-size:22px;color:var(--paper);
  display:flex;align-items:center;justify-content:center;
}

/* FLASH */
#flash{
  position:absolute;inset:0;background:white;
  opacity:0;pointer-events:none;transition:opacity .1s;
}
#flash.show{opacity:1;}

/* TOAST */
#toast{
  position:fixed;bottom:120px;left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,.85);color:var(--paper);
  font-size:11px;letter-spacing:2px;padding:8px 20px;
  opacity:0;transition:opacity .3s;white-space:nowrap;
  pointer-events:none;
}
#toast.show{opacity:1;}

/* CANVAS hidden */
#canvas{display:none;}
</style>
</head>
<body>

<!-- SETUP -->
<div class="screen" id="setup-screen">
  <div class="logo">ПРОМО<br>КАМ</div>
  <div class="logo-sub">контроль расклейки</div>

  <div class="setup-form">
    <div class="field-label">Номер маршрута</div>
    <input class="route-input" id="route-input" type="tel" placeholder="001" maxlength="6" inputmode="numeric">
    <div class="gps-status searching" id="gps-status">⊙ Получаем GPS...</div>
    <button class="start-btn" id="start-btn" disabled>ОТКРЫТЬ КАМЕРУ →</button>
  </div>
</div>

<!-- CAMERA -->
<div class="screen hidden" id="camera-screen">
  <video id="video" autoplay playsinline muted></video>

  <div id="watermark">
    <div class="wm-route" id="wm-route">МАРШРУТ —</div>
    <div class="wm-time" id="wm-time">—</div>
    <div class="wm-gps" id="wm-gps">GPS...</div>
  </div>

  <div id="shutter-wrap">
    <button id="back-btn" onclick="goBack()">←</button>
    <button id="shutter" onclick="takePhoto()"></button>
    <div class="counter" id="counter">0</div>
  </div>

  <div id="flash"></div>
</div>

<div id="toast"></div>
<canvas id="canvas"></canvas>

<script>
// ── STATE ──
let routeNumber = '';
let gpsCoords = null;
let photoCount = 0;
let stream = null;
let clockInterval = null;
let gpsWatchId = null;
let gpsAccuracy = null;

// ── GPS ──
const gpsStatusEl = document.getElementById('gps-status');
const startBtn = document.getElementById('start-btn');

function startGPS() {
  if (!navigator.geolocation) {
    gpsStatusEl.className = 'gps-status error';
    gpsStatusEl.textContent = '✗ GPS недоступен';
    startBtn.disabled = false;
    return;
  }

  gpsWatchId = navigator.geolocation.watchPosition(
    pos => {
      gpsCoords = { lat: pos.coords.latitude, lon: pos.coords.longitude };
      gpsAccuracy = Math.round(pos.coords.accuracy);
      gpsStatusEl.className = 'gps-status ok';
      gpsStatusEl.textContent = `✓ GPS: ±${gpsAccuracy}м`;
      startBtn.disabled = !routeNumber.trim();
      updateWatermark();
    },
    err => {
      gpsStatusEl.className = 'gps-status error';
      gpsStatusEl.textContent = '⚠ GPS недоступен — продолжить?';
      startBtn.disabled = !routeNumber.trim();
    },
    { enableHighAccuracy: true, maximumAge: 5000, timeout: 15000 }
  );
}

// ── ROUTE INPUT ──
document.getElementById('route-input').addEventListener('input', e => {
  routeNumber = e.target.value.trim();
  startBtn.disabled = !routeNumber || (!gpsCoords && gpsStatusEl.className.includes('searching'));
});

// ── START ──
startBtn.addEventListener('click', async () => {
  if (!routeNumber) return;
  await startCamera();
});

async function startCamera() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1920 }, height: { ideal: 1080 } },
      audio: false
    });
    document.getElementById('video').srcObject = stream;
    showScreen('camera');
    startClock();
  } catch(e) {
    showToast('Нет доступа к камере');
  }
}

// ── CLOCK ──
function startClock() {
  updateWatermark();
  clockInterval = setInterval(updateWatermark, 1000);
}

function updateWatermark() {
  const now = new Date();
  const date = now.toLocaleDateString('ru-RU', { day:'2-digit', month:'2-digit', year:'numeric' });
  const time = now.toLocaleTimeString('ru-RU', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
  document.getElementById('wm-route').textContent = `МАРШРУТ ${routeNumber}`;
  document.getElementById('wm-time').textContent = `${date}  ${time}`;
  if (gpsCoords) {
    document.getElementById('wm-gps').textContent =
      `${gpsCoords.lat.toFixed(6)}, ${gpsCoords.lon.toFixed(6)}  ±${gpsAccuracy||'?'}м`;
  } else {
    document.getElementById('wm-gps').textContent = 'GPS не определён';
  }
}

// ── TAKE PHOTO ──
async function takePhoto() {
  const video = document.getElementById('video');
  const canvas = document.getElementById('canvas');

  // Flash
  const flash = document.getElementById('flash');
  flash.classList.add('show');
  setTimeout(() => flash.classList.remove('show'), 150);

  // Draw video to canvas
  canvas.width = video.videoWidth || 1280;
  canvas.height = video.videoHeight || 720;
  const ctx = canvas.getContext('2d');
  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

  // Draw watermark
  drawWatermark(ctx, canvas.width, canvas.height);

  // Save to phone
  const filename = buildFilename();
  canvas.toBlob(blob => {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    a.click();
    URL.revokeObjectURL(url);
    photoCount++;
    document.getElementById('counter').textContent = photoCount;
    showToast('✓ Сохранено: ' + filename);
  }, 'image/jpeg', 0.92);
}

function drawWatermark(ctx, w, h) {
  const now = new Date();
  const date = now.toLocaleDateString('ru-RU', { day:'2-digit', month:'2-digit', year:'numeric' });
  const time = now.toLocaleTimeString('ru-RU', { hour:'2-digit', minute:'2-digit', second:'2-digit' });

  // Background gradient
  const grad = ctx.createLinearGradient(0, h * 0.65, 0, h);
  grad.addColorStop(0, 'rgba(0,0,0,0)');
  grad.addColorStop(1, 'rgba(0,0,0,0.85)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, h * 0.65, w, h * 0.35);

  const pad = w * 0.025;
  const base = h - pad;

  // Route (big, red)
  ctx.font = `bold ${w * 0.055}px 'Arial Black', sans-serif`;
  ctx.fillStyle = '#e8401c';
  ctx.fillText(`МАРШРУТ ${routeNumber}`, pad, base - w * 0.095);

  // Date + time
  ctx.font = `${w * 0.028}px 'Courier New', monospace`;
  ctx.fillStyle = '#f5f0e8';
  ctx.fillText(`${date}   ${time}`, pad, base - w * 0.048);

  // GPS
  ctx.font = `${w * 0.022}px 'Courier New', monospace`;
  ctx.fillStyle = '#44aaff';
  if (gpsCoords) {
    ctx.fillText(`${gpsCoords.lat.toFixed(6)}, ${gpsCoords.lon.toFixed(6)}   ±${gpsAccuracy||'?'}м`, pad, base - w * 0.01);
  } else {
    ctx.fillStyle = '#e8401c';
    ctx.fillText('GPS НЕ ОПРЕДЕЛЁН', pad, base - w * 0.01);
  }
}

function buildFilename() {
  const now = new Date();
  const d = now.toISOString().slice(0,10).replace(/-/g,'');
  const t = now.toTimeString().slice(0,8).replace(/:/g,'');
  const n = String(photoCount + 1).padStart(3,'0');
  return `Маршрут${routeNumber}_${n}_${d}_${t}.jpg`;
}

// ── BACK ──
function goBack() {
  if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
  if (clockInterval) { clearInterval(clockInterval); clockInterval = null; }
  photoCount = 0;
  document.getElementById('counter').textContent = '0';
  showScreen('setup');
}

// ── SCREENS ──
function showScreen(name) {
  document.getElementById('setup-screen').classList.toggle('hidden', name !== 'setup');
  document.getElementById('camera-screen').classList.toggle('hidden', name !== 'camera');
}

// ── TOAST ──
let toastTimer = null;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
}

// ── INIT ──
startGPS();
</script>
</body>
</html>
